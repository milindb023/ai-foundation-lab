version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - faiss_data:/app/faiss_index
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - FAISS_INDEX_PATH=/app/faiss_index
      - EVAL_LOG_PATH=/app/logs/ragas_eval.jsonl
      - LOG_LEVEL=INFO
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  faiss_data:
